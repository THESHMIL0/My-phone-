<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f2f2f7; /* Standard settings gray background */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding-top: 50px;
      padding-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-color: white;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
    }

    .back-btn {
      position: absolute;
      left: 15px;
      color: #007aff;
      font-size: 16px;
      cursor: pointer;
    }

    .settings-list {
      padding: 20px;
    }

    .section-title {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-left: 10px;
    }

    /* The grid of wallpaper options */
    .wallpaper-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      background-color: white;
      padding: 20px;
      border-radius: 15px;
    }

    .wallpaper-option {
      height: 120px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .wallpaper-option:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span>Settings ⚙️</span>
  </div>

  <div class="settings-list">
    <div class="section-title">Choose Wallpaper</div>
    
    <div class="wallpaper-grid">
      <div class="wallpaper-option" style="background: linear-gradient(to bottom right, #ff7e5f, #feb47b);" onclick="changeWallpaper('linear-gradient(to bottom right, #ff7e5f, #feb47b)')"></div>
      
      <div class="wallpaper-option" style="background: linear-gradient(to bottom right, #2193b0, #6dd5ed);" onclick="changeWallpaper('linear-gradient(to bottom right, #2193b0, #6dd5ed)')"></div>
      
      <div class="wallpaper-option" style="background: linear-gradient(to bottom right, #41295a, #2F0743);" onclick="changeWallpaper('linear-gradient(to bottom right, #41295a, #2F0743)')"></div>
      
      <div class="wallpaper-option" style="background: linear-gradient(to bottom right, #11998e, #38ef7d);" onclick="changeWallpaper('linear-gradient(to bottom right, #11998e, #38ef7d)')"></div>
      
      <div class="wallpaper-option" style="background: #000;" onclick="changeWallpaper('#000')"></div>
      
      <div class="wallpaper-option" style="background: linear-gradient(to bottom right, #ff9a9e, #fecfef);" onclick="changeWallpaper('linear-gradient(to bottom right, #ff9a9e, #fecfef)')"></div>
    </div>
  </div>

  <script>
    // --- JAVASCRIPT: The Settings Brain ---

    function changeWallpaper(newBackground) {
      // 1. Tell the parent window (index.html) to change its background style
      window.parent.document.getElementById('home-screen').style.background = newBackground;
      
      // 2. Save the choice to localStorage so it remembers next time you open the website!
      localStorage.setItem('phoneWallpaper', newBackground);
      
      // 3. Give a little alert so the user knows it worked
      alert("Wallpaper updated! Press Back to see it.");
    }
  </script>

</body>
</html>
