<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #fff; }
    .header { padding: 45px 15px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 18px; font-weight: 600; border-bottom: 1px solid #eee; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;}
    .back-btn, .clear-btn { color: #007aff; cursor: pointer; font-size: 16px; font-weight: normal; }
    
    .chat-area { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; background: #f9f9f9;}
    
    /* NEW: Sleek slide-in animation */
    @keyframes slideIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .bubble { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 15px; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: slideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
    
    .received { background: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
    .sent { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .input-area { display: flex; padding: 10px 15px 30px; background: white; border-top: 1px solid #eee; align-items: center;}
    #msg-input { flex-grow: 1; border: 1px solid #ddd; border-radius: 20px; padding: 12px 15px; font-size: 15px; outline: none; background: #f2f2f7; transition: border 0.2s;}
    #msg-input:focus { border-color: #007aff; }
    #send-btn { background: #007aff; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; margin-left: 10px; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.1s;}
    #send-btn:active { transform: scale(0.9); }
    
    .typing { display: none; background: #e5e5ea; align-self: flex-start; border-radius: 20px; border-bottom-left-radius: 4px; padding: 12px 18px; gap: 5px; align-items: center; animation: slideIn 0.3s; }
    .dot { width: 6px; height: 6px; background: #8e8e93; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span>AI Bot 🤖</span>
    <div class="clear-btn" onclick="clearChat()">Clear</div>
  </div>
  
  <div class="chat-area" id="chat-area">
    <div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="iMessage..." onkeypress="if(event.key==='Enter') send()">
    <button id="send-btn" onclick="send()">↑</button>
  </div>

  <script>
    let history = JSON.parse(localStorage.getItem('chats')) || [{ text: "Hello! How can I help today?", type: "received" }];
    const area = document.getElementById('chat-area'), typeInd = document.getElementById('typing');
    
    function render() {
      document.querySelectorAll('.bubble').forEach(e => e.remove());
      history.forEach(m => createB(m.text, m.type));
    }
    
    function createB(text, type) {
      const b = document.createElement('div'); b.className = "bubble " + type; b.textContent = text;
      area.insertBefore(b, typeInd); area.scrollTop = area.scrollHeight;
    }
    
    function send() {
      const inp = document.getElementById('msg-input');
      if(!inp.value.trim()) return;
      history.push({text: inp.value, type: 'sent'});
      localStorage.setItem('chats', JSON.stringify(history));
      createB(inp.value, 'sent'); inp.value = "";
      typeInd.style.display = 'flex'; area.scrollTop = area.scrollHeight;
      
      setTimeout(() => {
        typeInd.style.display = 'none';
        const reply = "That's so interesting! Tell me more! ✨";
        history.push({text: reply, type: 'received'});
        localStorage.setItem('chats', JSON.stringify(history));
        createB(reply, 'received');
      }, 1500);
    }

    function clearChat() {
      if(confirm("Delete all messages?")) {
        history = [{ text: "Chat cleared. Hello again! 👋", type: "received" }];
        localStorage.setItem('chats', JSON.stringify(history));
        render();
      }
    }
    
    render();
  </script>
</body>
</html>
