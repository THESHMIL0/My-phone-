<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Pushes content down so it isn't hidden by the phone notch */
    .header {
      padding-top: 50px; 
      padding-bottom: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
      background-color: #f9f9f9;
    }

    .chat-area {
      flex-grow: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      max-width: 70%;
      font-size: 15px;
    }

    .received {
      background-color: #e5e5ea;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .sent {
      background-color: #007aff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="header">Messages</div>

  <div class="chat-area">
    <div class="bubble received">Hey! Check out my new phone website! 😎</div>
    <div class="bubble sent">Wow, that is so cool! Are you hosting it on GitHub?</div>
    <div class="bubble received">Sure am! It even has separate files for apps.</div>
  </div>

</body>
</html>
