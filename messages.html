<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Updated Header with Flexbox to fit the back button */
    .header {
      padding-top: 50px; 
      padding-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
      background-color: #f9f9f9;
    }

    /* The new Back Button styling */
    .back-btn {
      position: absolute;
      left: 15px;
      color: #007aff; /* Classic blue link color */
      font-size: 16px;
      cursor: pointer;
      font-weight: normal;
    }

    .chat-area {
      flex-grow: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      max-width: 70%;
      font-size: 15px;
    }

    .received {
      background-color: #e5e5ea;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .sent {
      background-color: #007aff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span>Messages</span>
  </div>

  <div class="chat-area">
    <div class="bubble received">Hey! Check out my new phone website! 😎</div>
    <div class="bubble sent">Wow, that is so cool! Are you hosting it on GitHub?</div>
    <div class="bubble received">Sure am! And now it actually has a back button! 🎉</div>
  </div>

</body>
</html>
