<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* The Header */
    .header {
      padding-top: 50px; 
      padding-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
      background-color: #f9f9f9;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 15px;
      color: #007aff;
      font-size: 16px;
      cursor: pointer;
    }

    /* The Chat Area */
    .chat-area {
      flex-grow: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      max-width: 70%;
      font-size: 15px;
      word-wrap: break-word;
      animation: popIn 0.3s ease-out; /* Tiny animation when a message appears */
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .received {
      background-color: #e5e5ea;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .sent {
      background-color: #007aff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    /* --- THE TYPING INDICATOR --- */
    .typing-indicator {
      display: none; /* Hidden until the bot is typing */
      background-color: #e5e5ea;
      align-self: flex-start;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      padding: 12px 18px;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background-color: #8e8e93;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* The Input Area at the bottom */
    .input-area {
      display: flex;
      padding: 10px 15px;
      padding-bottom: 30px; 
      border-top: 1px solid #ccc;
      background-color: #f9f9f9;
    }

    #message-input {
      flex-grow: 1;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 10px 15px;
      font-size: 15px;
      outline: none;
    }

    #send-btn {
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin-left: 10px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span>AI Bot 🤖</span>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="message-input" placeholder="iMessage..." onkeypress="handleKeyPress(event)">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <script>
    // --- JAVASCRIPT: Memory & AI Brain ---

    const chatArea = document.getElementById('chat-area');
    const typingIndicator = document.getElementById('typing-indicator');
    
    // An array to hold all our messages so we can save them
    let chatHistory = [];

    // 1. LOAD MESSAGES WHEN APP OPENS
    function loadMessages() {
      const savedChats = localStorage.getItem('phoneChats');
      
      if (savedChats) {
        // If we have saved chats, convert them back from text into a list
        chatHistory = JSON.parse(savedChats);
        
        // Put each saved message on the screen
        chatHistory.forEach(msg => {
          createBubble(msg.text, msg.type);
        });
      } else {
        // If this is the very first time opening the app, create a welcome message
        const welcomeMsg = { text: "Hi there! I am your AI bot. My memory is now working! 🧠", type: "received" };
        chatHistory.push(welcomeMsg);
        saveMessages();
        createBubble(welcomeMsg.text, welcomeMsg.type);
      }
      
      scrollToBottom();
    }

    // 2. SAVE MESSAGES TO MEMORY
    function saveMessages() {
      // JSON.stringify turns our list into text so the browser can save it permanently
      localStorage.setItem('phoneChats', JSON.stringify(chatHistory));
    }

    // 3. CREATE A CHAT BUBBLE ON SCREEN
    function createBubble(text, type) {
      const newBubble = document.createElement('div');
      newBubble.className = "bubble " + type; 
      newBubble.textContent = text;
      
      // We insert the new message right BEFORE the typing indicator
      chatArea.insertBefore(newBubble, typingIndicator);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 4. SEND A MESSAGE
    function sendMessage() {
      const inputField = document.getElementById('message-input');
      const messageText = inputField.value.trim();

      if (messageText === "") return;

      // Add user message to history, save it, and show it
      chatHistory.push({ text: messageText, type: 'sent' });
      saveMessages();
      createBubble(messageText, 'sent');
      
      inputField.value = "";

      // Show the typing indicator
      typingIndicator.style.display = 'flex';
      scrollToBottom();

      // Make the AI wait 1.5 seconds before replying
      setTimeout(aiReply, 1500);
    }

    // 5. THE AI REPLY LOGIC
    function aiReply() {
      // Hide the typing indicator
      typingIndicator.style.display = 'none';

      const botResponses = [
        "That is so cool! 😎",
        "I am remembering everything you say now!",
        "Beep boop! 🤖",
        "Haha, absolutely! 😂",
        "Whoa, I didn't know that!",
        "You are an amazing coder! 💻",
        "Tell me more..."
      ];

      const randomIndex = Math.floor(Math.random() * botResponses.length);
      const chosenReply = botResponses[randomIndex];

      // Add bot message to history, save it, and show it
      chatHistory.push({ text: chosenReply, type: 'received' });
      saveMessages();
      createBubble(chosenReply, 'received');
    }

    // Press enter to send
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Run the load function immediately when the app opens!
    loadMessages();
  </script>

</body>
</html>
