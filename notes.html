<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <style>
    body { margin:0; font-family:-apple-system, sans-serif; background:#f2f2f7; display:flex; flex-direction:column; height:100vh;}
    .header { padding:45px 15px 10px; display:flex; justify-content:space-between; align-items:center; background:#fff; border-bottom:1px solid #ccc; font-weight:bold; box-shadow: 0 1px 5px rgba(0,0,0,0.05);}
    .btn { color:#ff9f0a; cursor:pointer; font-size: 16px; font-weight: 500;}
    
    .mic-btn { background:#ff9f0a; color:white; border:none; border-radius:20px; padding:8px 15px; font-weight:bold; cursor:pointer; transition:0.2s; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 10px rgba(255,159,10,0.3);}
    .mic-btn.active { background:#ff3b30; box-shadow: 0 2px 15px rgba(255,59,48,0.5); animation:pulse 1s infinite alternate; }
    @keyframes pulse { to { transform: scale(1.05); } }
    
    textarea { flex-grow:1; padding:20px; font-size:18px; border:none; outline:none; background:#fff; resize:none; line-height:1.6; color: #333;}
  </style>
</head>
<body>
  <div class="header">
    <span class="btn" onclick="window.parent.closeApp()">◀ Home</span>
    <button class="mic-btn" id="micBtn" onclick="toggleDictation()">🎤 Dictate</button>
    <span class="btn" onclick="save()">Save</span>
  </div>
  
  <textarea id="editor" placeholder="Start typing, or tap Dictate to speak..."></textarea>
  
  <script>
    const editor = document.getElementById('editor');
    const micBtn = document.getElementById('micBtn');
    let isRecording = false;
    let recognition;

    // Load saved note
    editor.value = localStorage.getItem('os_notes_main') || "";
    function save() { 
      localStorage.setItem('os_notes_main', editor.value); 
      alert("Note Saved!"); 
    }

    // Initialize Web Speech API
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = function(event) {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + " ";
        }
        if(finalTranscript) editor.value += finalTranscript;
      };
      
      recognition.onerror = function(e) { 
        alert("Microphone error or permission denied."); 
        if(isRecording) toggleDictation(); 
      };
    } else {
      micBtn.style.display = 'none'; // Hide if browser doesn't support it
    }

    function toggleDictation() {
      if(!recognition) return alert("Speech Recognition not supported on this browser.");
      
      if(isRecording) {
        recognition.stop(); 
        micBtn.classList.remove('active'); 
        micBtn.innerText = "🎤 Dictate";
      } else {
        recognition.start(); 
        micBtn.classList.add('active'); 
        micBtn.innerText = "Listening...";
      }
      isRecording = !isRecording;
    }
  </script>
</body>
</html>
