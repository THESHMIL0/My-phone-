<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fffacd; /* A nice light yellow notepad color */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* The top header */
    .header {
      padding-top: 50px;
      padding-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-color: #ffeb85; /* Slightly darker yellow for the header */
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #e0ce67;
    }

    .back-btn {
      position: absolute;
      left: 15px;
      color: #d97706; /* Orange-brown back button */
      font-size: 16px;
      cursor: pointer;
    }

    /* The typing area */
    #note-area {
      flex-grow: 1; /* Fills the rest of the screen */
      width: 100%;
      border: none;
      padding: 20px;
      padding-bottom: 40px; /* Room for the home bar */
      font-size: 18px;
      outline: none; /* Removes the blue glow when typing */
      background-color: transparent;
      resize: none; /* Stops the user from resizing the box */
      box-sizing: border-box; /* Keeps padding inside the screen bounds */
      line-height: 1.5; /* Makes text easier to read */
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span>My Notes 📝</span>
  </div>

  <textarea id="note-area" placeholder="Start typing your notes here..."></textarea>

  <script>
    // --- JAVASCRIPT: The Memory Brain ---

    const noteArea = document.getElementById('note-area');

    // 1. LOAD: When the app opens, look in the phone's memory
    const savedNotes = localStorage.getItem('myPhoneNotes');
    
    // If we found saved notes, put them on the screen!
    if (savedNotes) {
      noteArea.value = savedNotes;
    }

    // 2. SAVE: Every single time you type a letter, save it
    noteArea.addEventListener('input', function() {
      // localStorage is like a permanent sticky note inside your browser
      localStorage.setItem('myPhoneNotes', noteArea.value);
    });
  </script>

</body>
</html>
