<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f2f2f7; }
    .header { padding: 45px 15px 10px; display: flex; align-items: center; background: white; border-bottom: 1px solid #ccc; position: relative;}
    .back-btn { color: #007aff; font-size: 16px; cursor: pointer; margin-right: 15px; }
    
    .url-bar { flex-grow: 1; display: flex; background: #e5e5ea; border-radius: 12px; padding: 10px 15px; align-items: center; transition: background 0.2s;}
    .url-bar:focus-within { background: #d1d1d6; }
    #search-input { border: none; background: transparent; outline: none; flex-grow: 1; font-size: 15px; margin-left: 8px; }
    
    /* Loading Bar Animation */
    .loading-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #007aff; width: 0%; transition: width 0.3s; opacity: 0;}
    .loading-bar.load { opacity: 1; animation: fakeLoad 1s ease-out forwards; }
    @keyframes fakeLoad { 0% { width: 0%; } 80% { width: 80%; } 100% { width: 100%; opacity: 0; } }

    .bookmarks { padding: 20px; display: flex; gap: 20px; justify-content: center; }
    .bm-btn { width: 60px; height: 60px; background: white; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.1s;}
    .bm-btn:active { transform: scale(0.9); }

    .web-content { flex-grow: 1; width: 100%; border: none; background: white; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀</div>
    <div class="url-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search or enter web address" onkeypress="search(event)">
    </div>
    <div class="loading-bar" id="loader"></div>
  </div>

  <div class="bookmarks" id="bm-container">
    <div class="bm-btn" onclick="loadSite('https://en.wikipedia.org/wiki/Main_Page')">🌐</div>
    <div class="bm-btn" onclick="loadSite('https://lite.cnn.com/')">📰</div>
    <div class="bm-btn" onclick="loadSite('https://html5test.com/')">🧪</div>
  </div>

  <iframe id="web-frame" class="web-content" src=""></iframe>

  <script>
    function search(event) {
      if (event.key === 'Enter') {
        const query = document.getElementById('search-input').value;
        const url = "https://en.wikipedia.org/wiki/Special:Search?search=" + encodeURIComponent(query);
        loadSite(url);
      }
    }

    function loadSite(url) {
      document.getElementById('bm-container').style.display = 'none'; // Hide bookmarks
      const frame = document.getElementById('web-frame');
      const loader = document.getElementById('loader');
      
      // Trigger loading animation
      loader.classList.remove('load');
      void loader.offsetWidth; // trigger reflow
      loader.classList.add('load');
      
      frame.src = url;
    }
  </script>
</body>
</html>
