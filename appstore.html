<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Store</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; color: #000; }
    .header { padding: 50px 20px 10px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 10; }
    .back-btn { color: #007aff; cursor: pointer; font-size: 16px; margin-bottom: 10px; display: block; }
    h1 { margin: 0; font-size: 32px; letter-spacing: -1px; }

    .featured-hero { margin: 20px; height: 180px; background: linear-gradient(45deg, #007aff, #5856d6); border-radius: 20px; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: white; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }
    
    .app-row { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
    .app-row:active { background: #f9f9f9; }
    .app-img { width: 60px; height: 60px; border-radius: 14px; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-size: 30px; background: #f2f2f7; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }
    .app-info { flex-grow: 1; }
    .app-name { font-weight: 600; font-size: 17px; }
    .app-cat { font-size: 13px; color: #8e8e93; margin-top: 2px; }

    .get-btn { background: #f1f2f6; color: #007aff; border: none; padding: 6px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: all 0.2s; position: relative; overflow: hidden; }
    .get-btn.installing { background: #34c759; color: white; width: 80px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="back-btn" onclick="window.parent.closeApp()">◀ Back</span>
    <h1>Apps</h1>
  </div>

  <div class="featured-hero">
    <div style="font-size: 12px; font-weight: bold; opacity: 0.8; text-transform: uppercase;">New Game</div>
    <div style="font-size: 24px; font-weight: bold;">Snake Pro Max</div>
  </div>

  <div id="store-list">
    </div>

  <script>
    const apps = [
      { id: 'app-paint', name: 'Paint', cat: 'Creativity', icon: '🎨' },
      { id: 'app-snake', name: 'Snake', cat: 'Games', icon: '🐍' },
      { id: 'app-piano', name: 'Piano', cat: 'Music', icon: '🎹' },
      { id: 'app-videotube', name: 'VideoTube', cat: 'Entertainment', icon: '🎬' }
    ];

    function renderApps() {
      const list = document.getElementById('store-list');
      list.innerHTML = apps.map(app => `
        <div class="app-row">
          <div class="app-img">${app.icon}</div>
          <div class="app-info">
            <div class="app-name">${app.name}</div>
            <div class="app-cat">${app.cat}</div>
          </div>
          <button class="get-btn" id="btn-${app.id}" onclick="buy('${app.id}')">GET</button>
        </div>
      `).join('');
    }

    function buy(id) {
      const btn = document.getElementById('btn-' + id);
      if (btn.innerText === "OPEN") { window.parent.openApp(id.split('-')[1]+'.html'); return; }
      
      btn.innerText = "•••";
      btn.classList.add('installing');
      
      setTimeout(() => {
        btn.innerText = "OPEN";
        btn.classList.remove('installing');
        localStorage.setItem('own_' + id.split('-')[1], 'true');
        window.parent.installApp(id);
      }, 2000);
    }
    renderApps();
  </script>
</body>
</html>
