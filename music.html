<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #1c1c1e; color: white; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; padding: 50px 15px 10px; display: flex; justify-content: center; position: relative; font-weight: bold; }
    .back-btn { position: absolute; left: 15px; color: #ff0844; cursor: pointer; }
    
    /* Spinning Record Animation */
    .album-art { width: 200px; height: 200px; background: linear-gradient(135deg, #ff0844, #ffb199); border-radius: 50%; margin: 60px 0 40px; border: 10px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: 80px; transition: transform 0.2s; }
    .spin { animation: rotation 4s infinite linear; }
    @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(359deg); } }

    .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    .artist { font-size: 16px; color: #8e8e93; }

    .progress { width: 80%; height: 6px; background: #333; border-radius: 3px; margin: 40px 0 20px; position: relative; }
    .progress-bar { width: 30%; height: 100%; background: #ff0844; border-radius: 3px; position: relative; }
    .progress-bar::after { content: ''; position: absolute; right: -5px; top: -4px; width: 14px; height: 14px; background: white; border-radius: 50%; }

    .controls { display: flex; gap: 40px; align-items: center; margin-top: 20px; font-size: 30px; }
    .play-btn { width: 60px; height: 60px; background: white; color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; transition: transform 0.1s; padding-left: 5px; box-sizing: border-box; }
    .play-btn:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <div class="header"><div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div> Now Playing</div>
  
  <div class="album-art" id="record">🎵</div>
  
  <div class="title">Coding Vibes</div>
  <div class="artist">The Developers</div>

  <div class="progress"><div class="progress-bar"></div></div>

  <div class="controls">
    <div>⏮</div>
    <div class="play-btn" id="play" onclick="togglePlay()">▶️</div>
    <div>⏭</div>
  </div>

  <script>
    let isPlaying = false;
    function togglePlay() {
      isPlaying = !isPlaying;
      const btn = document.getElementById('play');
      const rec = document.getElementById('record');
      
      if (isPlaying) {
        btn.innerHTML = '⏸';
        btn.style.paddingLeft = '0'; // Fix center alignment for pause
        rec.classList.add('spin');
      } else {
        btn.innerHTML = '▶️';
        btn.style.paddingLeft = '5px';
        rec.classList.remove('spin');
      }
    }
  </script>
</body>
</html>
