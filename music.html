<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 45px 20px 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .btn { color: #ff0844; cursor: pointer; font-size: 16px; font-weight: 500;}
    
    .album-art { width: 260px; height: 260px; margin: 40px auto; background: linear-gradient(135deg, #ff0844, #ffb199); border-radius: 20px; box-shadow: 0 10px 30px rgba(255,8,68,0.4); display: flex; justify-content: center; align-items: center; font-size: 80px; transition: 0.3s; }
    .album-art.playing { transform: scale(1.05); animation: pulse 2s infinite alternate; }
    @keyframes pulse { to { box-shadow: 0 10px 50px rgba(255,8,68,0.8); } }

    .info { text-align: center; padding: 0 20px; }
    .title { font-size: 24px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artist { font-size: 16px; color: #ffb199; }

    .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 40px; }
    .play-btn { width: 70px; height: 70px; border-radius: 50%; background: white; color: black; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }
    .play-btn:active { transform: scale(0.9); }

    .upload-btn { margin: 40px auto; background: #222; padding: 12px 24px; border-radius: 20px; color: white; font-weight: bold; text-align: center; width: max-content; cursor: pointer; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="header"><span class="btn" onclick="window.parent.closeApp()">◀ Home</span><span>Now Playing</span><span style="width: 50px;"></span></div>

  <div class="album-art" id="art">🎵</div>
  
  <div class="info">
    <div class="title" id="track-title">No Track Loaded</div>
    <div class="artist" id="track-artist">Select a song to begin</div>
  </div>

  <div class="controls">
    <div class="play-btn" onclick="togglePlay()" id="play-btn">▶</div>
  </div>

  <label class="upload-btn">
    📁 Load Local Audio File
    <input type="file" accept="audio/*" id="audio-upload">
  </label>

  <audio id="player"></audio>

  <script>
    const player = document.getElementById('player'), art = document.getElementById('art'), playBtn = document.getElementById('play-btn');
    let isPlaying = false;

    document.getElementById('audio-upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(file) {
        document.getElementById('track-title').innerText = file.name.replace(/\.[^/.]+$/, "");
        document.getElementById('track-artist').innerText = "Local Device";
        player.src = URL.createObjectURL(file);
        playAudio();
      }
    });

    function togglePlay() {
      if(!player.src || player.src.endsWith("music.html")) return alert("Please load an audio file first!");
      isPlaying ? pauseAudio() : playAudio();
    }

    function playAudio() { player.play(); isPlaying = true; playBtn.innerText = "⏸"; art.classList.add('playing'); }
    function pauseAudio() { player.pause(); isPlaying = false; playBtn.innerText = "▶"; art.classList.remove('playing'); }
    
    player.onended = pauseAudio;
  </script>
</body>
</html>
