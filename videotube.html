<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoTube</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: white; display: flex; flex-direction: column; }
    .header { padding: 50px 15px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; position: relative;}
    .back-btn { color: #ff0000; cursor: pointer; font-size: 16px; font-weight: bold;}
    
    .video-container { width: 100%; position: relative; margin-top: 20px; background: #111;}
    video { width: 100%; display: block; }
    
    /* Custom Controls Overlay */
    .custom-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; padding: 10px; box-sizing: border-box; gap: 15px; opacity: 0; transition: opacity 0.3s;}
    .video-container:hover .custom-controls { opacity: 1; } /* Show controls on hover/tap */
    
    .control-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    
    .progress-bar-container { flex-grow: 1; height: 5px; background: #555; border-radius: 3px; cursor: pointer; position: relative; }
    .progress-bar-fill { width: 0%; height: 100%; background: #ff0000; border-radius: 3px; pointer-events: none;}

    .video-info { padding: 20px; }
    .video-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
    .video-views { font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span style="margin-left: 20px; font-weight: bold; font-size: 20px;">VideoTube 🎬</span>
  </div>

  <div class="video-container">
    <video id="myVideo" src="https://www.w3schools.com/html/mov_bbb.mp4" playsinline></video>
    
    <div class="custom-controls">
      <button class="control-btn" id="playPauseBtn" onclick="togglePlay()">▶️</button>
      <div class="progress-bar-container" id="progressContainer" onclick="seek(event)">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <button class="control-btn" onclick="toggleFullScreen()">⛶</button>
    </div>
  </div>

  <div class="video-info">
    <div class="video-title">Big Buck Bunny (Short)</div>
    <div class="video-views">1.2M views • 1 day ago</div>
  </div>

  <script>
    const video = document.getElementById('myVideo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');

    function togglePlay() {
      if (video.paused) {
        video.play();
        playPauseBtn.innerText = '⏸️';
      } else {
        video.pause();
        playPauseBtn.innerText = '▶️';
      }
    }

    video.addEventListener('timeupdate', () => {
      const percentage = (video.currentTime / video.duration) * 100;
      progressBar.style.width = percentage + '%';
    });

    function seek(event) {
      const rect = progressContainer.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const percentage = clickX / rect.width;
      video.currentTime = percentage * video.duration;
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        video.requestFullscreen().catch(err => {
          alert("Fullscreen not supported on this device.");
        });
      } else {
        document.exitFullscreen();
      }
    }

    video.addEventListener('ended', () => {
      playPauseBtn.innerText = '▶️';
    });
  </script>
</body>
</html>
