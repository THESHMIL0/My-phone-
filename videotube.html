<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoTube</title>
  <style>
    body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; }
    .nav { padding: 45px 15px 10px; display: flex; align-items: center; background: #0f0f0f; position: sticky; top: 0; z-index: 5; }
    .back-btn { color: red; font-weight: bold; margin-right: 15px; cursor: pointer; }
    .logo { font-size: 20px; font-weight: bold; letter-spacing: -1px; }

    .video-card { width: 100%; margin-bottom: 25px; cursor: pointer; }
    .thumb { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; display: flex; justify-content: center; align-items: center; font-size: 40px; }
    .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .meta { padding: 12px; display: flex; gap: 12px; }
    .channel-pfp { width: 36px; height: 36px; border-radius: 50%; background: #444; }
    .title { font-size: 14px; font-weight: 500; line-height: 1.4; }
    .stats { font-size: 12px; color: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="nav">
    <span class="back-btn" onclick="window.parent.closeApp()">◀</span>
    <span class="logo">VideoTube</span>
  </div>

  <div class="video-card" onclick="play()">
    <div class="thumb">🎮<div class="duration">10:42</div></div>
    <div class="meta">
      <div class="channel-pfp"></div>
      <div class="info">
        <div class="title">I Built a Web OS on a Realme 12+ 5G!</div>
        <div class="stats">TechBot • 1.2M views • 2 hours ago</div>
      </div>
    </div>
  </div>

  <div class="video-card" onclick="play()">
    <div class="thumb">🌊<div class="duration">3:15</div></div>
    <div class="meta">
      <div class="channel-pfp"></div>
      <div class="info">
        <div class="title">Relaxing 4K Nature Ripples - No Music</div>
        <div class="stats">NatureTube • 500K views • 1 day ago</div>
      </div>
    </div>
  </div>

  <script>
    function play() {
      alert("Opening Cinema Player...\n(This would link to an MP4 or YouTube embed in a real build!)");
    }
  </script>
</body>
</html>
