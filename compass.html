<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
    .header { width: 100%; padding: 45px 15px 15px; display: flex; justify-content: space-between; box-sizing: border-box; font-weight: bold; }
    .btn { color: #ff3b30; cursor: pointer; }
    
    .compass-container { width: 300px; height: 300px; border: 4px solid #333; border-radius: 50%; position: relative; display: flex; justify-content: center; align-items: center; margin-top: 50px; background: #111; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    .dial { width: 100%; height: 100%; border-radius: 50%; position: absolute; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px; box-sizing: border-box; font-weight: bold; font-size: 24px; color: #888; transition: transform 0.1s linear;}
    .north { color: #ff3b30; }
    .needle { width: 4px; height: 140px; background: linear-gradient(to top, transparent 50%, #ff3b30 50%); position: absolute; z-index: 10; border-radius: 2px;}
    .center-dot { width: 16px; height: 16px; background: white; border-radius: 50%; z-index: 11; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
    
    .readout { font-size: 50px; font-weight: 200; margin-top: 40px; }
    .warning { color: #ff9f0a; text-align: center; margin-top: 20px; font-size: 14px; padding: 0 20px;}
  </style>
</head>
<body>
  <div class="header"><span class="btn" onclick="window.parent.closeApp()">◀ Home</span><span>Compass</span><span style="width:50px"></span></div>
  
  <div class="compass-container">
    <div class="dial" id="dial">
      <div class="north">N</div>
      <div style="width: 100%; display: flex; justify-content: space-between; position: absolute; top: 50%; transform: translateY(-50%); padding: 0 15px; box-sizing: border-box;"><span>W</span><span>E</span></div>
      <div>S</div>
    </div>
    <div class="needle"></div>
    <div class="center-dot"></div>
  </div>
  
  <div class="readout" id="heading">0°</div>
  <div class="warning">Turn on device sensors to calibrate compass.</div>

  <script>
    const dial = document.getElementById('dial'), heading = document.getElementById('heading');
    
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', function(e) {
        if (e.alpha !== null) {
          // alpha is the compass direction (0 to 360)
          let dir = Math.round(e.alpha);
          // Rotate the dial opposite to the phone's turn
          dial.style.transform = `rotate(${-dir}deg)`;
          heading.innerText = `${dir}°`;
        }
      }, true);
    } else {
      heading.innerText = "N/A";
      alert("Device orientation not supported on this browser.");
    }
  </script>
</body>
</html>
