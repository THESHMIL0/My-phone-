<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background: white; }
    .header { padding: 50px 15px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: relative;}
    .back-btn { color: #007aff; cursor: pointer; font-size: 16px; }
    
    /* Hide the ugly default file input button */
    input[type="file"] { display: none; }
    .add-btn { color: #007aff; font-size: 24px; cursor: pointer; font-weight: bold; }

    .gallery-grid { padding: 2px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex-grow: 1; padding-bottom: 30px;}
    .photo-box { width: 100%; aspect-ratio: 1 / 1; background-color: #f2f2f7; background-size: cover; background-position: center; cursor: pointer; }
    
    .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <span style="font-weight: bold; font-size: 20px;">Photos</span>
    <label class="add-btn">
      +
      <input type="file" id="photo-upload" accept="image/*" multiple onchange="loadPhotos(event)">
    </label>
  </div>

  <div class="empty-state" id="empty-state">
    <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
    Tap '+' to add photos
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <script>
    function loadPhotos(event) {
      const files = event.target.files;
      const grid = document.getElementById('gallery-grid');
      const emptyState = document.getElementById('empty-state');

      if (files.length > 0) {
        emptyState.style.display = 'none'; // Hide the empty message
      }

      // Loop through all selected photos
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        
        // Create a temporary URL for the image so the browser can show it
        const imageUrl = URL.createObjectURL(file);
        
        // Create a square div with the image as the background
        const photoDiv = document.createElement('div');
        photoDiv.className = 'photo-box';
        photoDiv.style.backgroundImage = `url(${imageUrl})`;
        
        // Add it to the grid!
        grid.appendChild(photoDiv);
      }
    }
  </script>
</body>
</html>
