<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background: white; }
    .header { padding: 50px 15px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
    .back-btn { color: #007aff; cursor: pointer; font-size: 16px; font-weight: bold;}
    .clear-btn { color: #ff3b30; cursor: pointer; font-size: 14px; font-weight: bold;}

    .gallery-grid { padding: 2px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex-grow: 1; padding-bottom: 30px;}
    .photo-box { width: 100%; aspect-ratio: 1 / 1; background-color: #f2f2f7; background-size: cover; background-position: center; cursor: pointer; }
    
    .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Home</div>
    <span style="font-weight: bold; font-size: 20px;">Photos</span>
    <div class="clear-btn" onclick="clearPhotos()">Trash All</div>
  </div>

  <div class="empty-state" id="empty-state">
    <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
    Take photos in the Camera app!
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <script>
    const grid = document.getElementById('gallery-grid');
    const emptyState = document.getElementById('empty-state');
    
    // Load photos saved by the Camera app
    let osPhotos = JSON.parse(localStorage.getItem('os_photos')) || [];

    if (osPhotos.length > 0) {
      emptyState.style.display = 'none';
      
      // Loop backwards so newest photos are at the top!
      for (let i = osPhotos.length - 1; i >= 0; i--) {
        const photoDiv = document.createElement('div');
        photoDiv.className = 'photo-box';
        photoDiv.style.backgroundImage = `url(${osPhotos[i]})`;
        
        // Click photo to see it full screen (Alert for now)
        photoDiv.onclick = () => alert("Beautiful photo!"); 
        grid.appendChild(photoDiv);
      }
    }

    function clearPhotos() {
      if(confirm("Delete all OS photos?")) {
        localStorage.removeItem('os_photos');
        grid.innerHTML = '';
        emptyState.style.display = 'block';
      }
    }
  </script>
</body>
</html>
