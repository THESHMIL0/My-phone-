<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialer</title>
  <style>
    body { margin: 0; background: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; position: relative;}
    .header { padding: 45px 15px 15px; position: relative; }
    .back-btn { color: #34c759; cursor: pointer; font-size: 16px; font-weight: 500;}
    
    #disp { flex-grow: 1; display: flex; justify-content: center; align-items: center; font-size: 45px; letter-spacing: 2px; padding: 20px; font-weight: 300;}
    
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 30px; padding: 10px 40px; justify-items: center; }
    .btn { width: 75px; height: 75px; background: #e5e5ea; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 36px; cursor: pointer; user-select: none; transition: transform 0.1s, background 0.1s; }
    .btn:active { background: #c7c7cc; transform: scale(0.9); }
    .sub { font-size: 11px; font-weight: bold; color: #666; margin-top: -6px; letter-spacing: 1px;}
    
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); padding: 20px 40px 50px; justify-items: center; align-items: center; }
    .call { width: 75px; height: 75px; background: #34c759; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; color: white; cursor: pointer; transition: transform 0.1s;}
    .call:active { transform: scale(0.9); }
    .del { font-size: 30px; color: #8e8e93; cursor: pointer; transition: color 0.2s;}
    .del:active { color: #000; }

    /* NEW: Active Call Screen Overlay */
    #call-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(30,30,30,0.95); backdrop-filter: blur(15px); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
    .call-name { font-size: 30px; font-weight: bold; margin-bottom: 10px;}
    .call-time { font-size: 18px; color: #aaa; margin-bottom: 50px;}
    .end-call { width: 75px; height: 75px; background: #ff3b30; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; color: white; cursor: pointer; margin-top: 100px; transition: transform 0.1s;}
    .end-call:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <div class="header"><div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div></div>
  <div id="disp"></div>
  
  <div class="keypad">
    <div class="btn" onclick="add('1')">1<div class="sub">&nbsp;</div></div>
    <div class="btn" onclick="add('2')">2<div class="sub">ABC</div></div>
    <div class="btn" onclick="add('3')">3<div class="sub">DEF</div></div>
    <div class="btn" onclick="add('4')">4<div class="sub">GHI</div></div>
    <div class="btn" onclick="add('5')">5<div class="sub">JKL</div></div>
    <div class="btn" onclick="add('6')">6<div class="sub">MNO</div></div>
    <div class="btn" onclick="add('7')">7<div class="sub">PQRS</div></div>
    <div class="btn" onclick="add('8')">8<div class="sub">TUV</div></div>
    <div class="btn" onclick="add('9')">9<div class="sub">WXYZ</div></div>
    <div class="btn" onclick="add('*')">*<div class="sub">&nbsp;</div></div>
    <div class="btn" onclick="add('0')">0<div class="sub">+</div></div>
    <div class="btn" onclick="add('#')">#<div class="sub">&nbsp;</div></div>
  </div>
  <div class="actions"><div></div><div class="call" onclick="startCall()">📞</div><div class="del" onclick="del()">⌫</div></div>

  <div id="call-screen">
    <div class="call-name" id="calling-number">Unknown</div>
    <div class="call-time" id="call-timer">00:00</div>
    <div style="font-size: 100px;">👤</div>
    <div class="end-call" onclick="endCall()">☎️</div>
  </div>

  <script>
    const d = document.getElementById('disp'); 
    let num = "";
    let callInterval;
    let seconds = 0;

    function add(n) { num += n; d.innerText = num; }
    function del() { num = num.slice(0, -1); d.innerText = num; }

    function startCall() {
      if(num === "") return;
      
      const screen = document.getElementById('call-screen');
      document.getElementById('calling-number').innerText = num;
      
      screen.style.display = 'flex';
      // Slight delay for CSS opacity transition to trigger
      setTimeout(() => screen.style.opacity = '1', 50); 
      
      seconds = 0;
      document.getElementById('call-timer').innerText = "00:00";
      
      callInterval = setInterval(() => {
        seconds++;
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('call-timer').innerText = 
          (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
      }, 1000);
    }

    function endCall() {
      clearInterval(callInterval);
      const screen = document.getElementById('call-screen');
      screen.style.opacity = '0';
      setTimeout(() => screen.style.display = 'none', 300);
      num = "";
      d.innerText = "";
    }
  </script>
</body>
</html>
