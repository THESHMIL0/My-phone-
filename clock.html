<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { color: #ff9f0a; cursor: pointer; }
    
    .timer-display { flex-grow: 1; display: flex; justify-content: center; align-items: center; font-size: 80px; font-variant-numeric: tabular-nums; font-weight: 200; }
    
    .controls { display: flex; justify-content: space-around; padding: 40px; }
    .btn { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
    .btn:active { transform: scale(0.9); }
    .start { background: #1c3d1e; color: #34c759; }
    .stop { background: #3d1c1c; color: #ff3b30; }
    .reset { background: #333; color: #fff; }

    .laps { height: 200px; overflow-y: auto; padding: 0 20px; border-top: 1px solid #222; }
    .lap-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; color: #888; }
  </style>
</head>
<body>
  <div class="header"><span class="back-btn" onclick="window.parent.closeApp()">◀ Back</span> <b>Stopwatch</b> <span></span></div>
  
  <div class="timer-display" id="display">00:00.00</div>

  <div class="laps" id="laps"></div>

  <div class="controls">
    <div class="btn reset" onclick="reset()">Reset</div>
    <div class="btn start" id="main-btn" onclick="toggle()">Start</div>
  </div>

  <script>
    let timer, startT, elapsed = 0, running = false;
    const disp = document.getElementById('display'), btn = document.getElementById('main-btn'), laps = document.getElementById('laps');

    function toggle() {
      if (!running) {
        startT = Date.now() - elapsed;
        timer = setInterval(update, 10);
        btn.innerText = "Stop"; btn.className = "btn stop";
        running = true;
      } else {
        clearInterval(timer);
        btn.innerText = "Start"; btn.className = "btn start";
        running = false;
      }
    }

    function update() {
      elapsed = Date.now() - startT;
      let ms = Math.floor((elapsed % 1000) / 10);
      let s = Math.floor((elapsed / 1000) % 60);
      let m = Math.floor(elapsed / 60000);
      disp.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
    }

    function reset() {
      clearInterval(timer);
      elapsed = 0; running = false;
      disp.innerText = "00:00.00";
      btn.innerText = "Start"; btn.className = "btn start";
      laps.innerHTML = "";
    }
  </script>
</body>
</html>
