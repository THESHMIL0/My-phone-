<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; background: #000; color: white; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; padding: 50px 15px 10px; display: flex; align-items: center; position: relative; }
    .back-btn { position: absolute; left: 15px; color: #ff9f0a; font-weight: bold; cursor: pointer; }
    .tab-container { margin-top: 20px; font-size: 24px; font-weight: bold; color: #ff9f0a; }
    .time-display { font-size: 75px; font-weight: 200; font-variant-numeric: tabular-nums; margin-top: 100px; display: flex; justify-content: center; width: 100%; }
    .ms { font-size: 40px; color: #888; margin-top: 30px; margin-left: 5px; }
    .btn-container { display: flex; gap: 80px; margin-top: 100px; }
    .circle-btn { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; border: 2px solid transparent; }
    .btn-reset { background: #333; color: white; }
    .btn-start { background: rgba(52, 199, 89, 0.2); color: #34c759; border-color: #34c759; }
    .btn-stop { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border-color: #ff3b30; display: none; }
  </style>
</head>
<body>
  <div class="header"><div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div></div>
  <div class="tab-container">Stopwatch</div>
  <div class="time-display"><span id="min">00</span>:<span id="sec">00</span><span class="ms" id="ms">.00</span></div>
  <div class="btn-container">
    <div class="circle-btn btn-reset" onclick="resetTimer()">Reset</div>
    <div class="circle-btn btn-start" id="startBtn" onclick="startTimer()">Start</div>
    <div class="circle-btn btn-stop" id="stopBtn" onclick="stopTimer()">Stop</div>
  </div>

  <script>
    let timerInterval, tens = 0, seconds = 0, minutes = 0;
    const aTens = document.getElementById("ms"), aSec = document.getElementById("sec"), aMin = document.getElementById("min");
    const startBtn = document.getElementById("startBtn"), stopBtn = document.getElementById("stopBtn");

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(start, 10);
      startBtn.style.display = 'none'; stopBtn.style.display = 'flex';
    }

    function stopTimer() {
      clearInterval(timerInterval);
      startBtn.style.display = 'flex'; stopBtn.style.display = 'none'; startBtn.innerText = "Resume";
      // Tell Dynamic Island to close
      if(window.parent.updateNotch) window.parent.updateNotch("", false);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      tens = 0; seconds = 0; minutes = 0;
      aTens.innerHTML = ".00"; aSec.innerHTML = "00"; aMin.innerHTML = "00";
      startBtn.style.display = 'flex'; stopBtn.style.display = 'none'; startBtn.innerText = "Start";
      if(window.parent.updateNotch) window.parent.updateNotch("", false);
    }

    function start() {
      tens++; 
      if(tens <= 9) aTens.innerHTML = ".0" + tens;
      if(tens > 9) aTens.innerHTML = "." + tens; 
      if (tens > 99) { seconds++; aSec.innerHTML = seconds <= 9 ? "0" + seconds : seconds; tens = 0; aTens.innerHTML = ".00"; }
      if (seconds > 59) { minutes++; aMin.innerHTML = minutes <= 9 ? "0" + minutes : minutes; seconds = 0; aSec.innerHTML = "00"; }
      
      // THIS IS THE MAGIC: Send the time to the parent window's Dynamic Island!
      const timeString = aMin.innerHTML + ":" + aSec.innerHTML + aTens.innerHTML;
      if(window.parent.updateNotch) window.parent.updateNotch(timeString, true);
    }
  </script>
</body>
</html>
