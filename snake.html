<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    body { margin: 0; background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; }
    .header { width: 100%; padding: 50px 15px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background: #111; }
    .back-btn { color: #34c759; cursor: pointer; font-weight: bold; }
    
    .score-board { font-size: 20px; font-weight: bold; color: #34c759;}
    
    #gameCanvas { background: #000; border: 2px solid #333; margin-top: 20px; }

    /* Touch Controls for Mobile */
    .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 10px; margin-top: auto; margin-bottom: 40px; }
    .dir-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 10px; color: white; font-size: 24px; cursor: pointer; }
    .dir-btn:active { background: rgba(255,255,255,0.5); }
    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }
    .down { grid-column: 2; grid-row: 3; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div>
    <div class="score-board">Score: <span id="score">0</span></div>
  </div>

  <canvas id="gameCanvas" width="300" height="300"></canvas>

  <div class="d-pad">
    <button class="dir-btn up" onclick="changeDir(0, -1)">▲</button>
    <button class="dir-btn left" onclick="changeDir(-1, 0)">◀</button>
    <button class="dir-btn right" onclick="changeDir(1, 0)">▶</button>
    <button class="dir-btn down" onclick="changeDir(0, 1)">▼</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let snake = [{x: 150, y: 150}];
    let dx = 0; // Speed X
    let dy = -10; // Speed Y (Moving up at start)
    let foodX; let foodY;
    let score = 0;
    let gameLoop;

    function createFood() {
      foodX = Math.floor(Math.random() * 30) * 10;
      foodY = Math.floor(Math.random() * 30) * 10;
    }

    function changeDir(x, y) {
      // Prevent snake from reversing into itself
      if (x === 1 && dx === -10) return;
      if (x === -1 && dx === 10) return;
      if (y === 1 && dy === -10) return;
      if (y === -1 && dy === 10) return;
      dx = x * 10; dy = y * 10;
    }

    function draw() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head); // Add new head

      // Check if food eaten
      if (head.x === foodX && head.y === foodY) {
        score += 10;
        document.getElementById('score').innerText = score;
        createFood();
      } else {
        snake.pop(); // Remove tail if no food eaten
      }

      // Check Game Over (Wall collision or self collision)
      if (head.x < 0 || head.x >= 300 || head.y < 0 || head.y >= 300 || 
          snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
        clearInterval(gameLoop);
        alert("Game Over! Score: " + score);
        // Reset
        snake = [{x: 150, y: 150}]; dx = 0; dy = -10; score = 0;
        document.getElementById('score').innerText = score;
        createFood();
        gameLoop = setInterval(draw, 100);
        return;
      }

      // Clear canvas
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = "#ff3b30";
      ctx.fillRect(foodX, foodY, 10, 10);

      // Draw snake
      ctx.fillStyle = "#34c759";
      snake.forEach(part => ctx.fillRect(part.x, part.y, 10, 10));
    }

    createFood();
    gameLoop = setInterval(draw, 100); // Game speed
  </script>
</body>
</html>
