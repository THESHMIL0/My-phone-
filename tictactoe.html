<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh;}
    .header { width: 100%; padding: 45px 15px 15px; box-sizing: border-box; display: flex; justify-content: space-between; font-weight: bold;}
    .btn { color: #0a84ff; cursor: pointer; }
    
    h2 { margin-top: 40px; font-weight: 300; font-size: 30px; }
    
    .board { display: grid; grid-template-columns: repeat(3, 90px); gap: 8px; margin-top: 20px; }
    .cell { width: 90px; height: 90px; background: #222; display: flex; justify-content: center; align-items: center; font-size: 60px; font-family: monospace; cursor: pointer; border-radius: 15px; transition: 0.2s;}
    .cell:active { background: #333; transform: scale(0.95);}
  </style>
</head>
<body>
  <div class="header"><span class="btn" onclick="window.parent.closeApp()">◀ Quit</span><span class="btn" onclick="reset()">Restart 🔄</span></div>
  <h2 id="status">Player X's Turn</h2>
  <div class="board" id="board"></div>

  <script>
    const board = document.getElementById('board'), status = document.getElementById('status');
    let cells = ["","","","","","","","",""], turn = "X", gameActive = true;

    function init() {
      board.innerHTML = "";
      cells.forEach((c, i) => {
        let div = document.createElement('div'); div.className = "cell";
        div.onclick = () => play(i, div);
        board.appendChild(div);
      });
    }

    function play(i, div) {
      if(!gameActive || cells[i] !== "") return;
      cells[i] = turn; div.innerText = turn; 
      div.style.color = turn === 'X' ? '#ff3b30' : '#34c759'; // Red X, Green O
      checkWin();
      if(gameActive) { turn = turn === "X" ? "O" : "X"; status.innerText = "Player " + turn + "'s Turn"; }
    }

    function checkWin() {
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(let w of wins) {
        if(cells[w[0]] && cells[w[0]] === cells[w[1]] && cells[w[0]] === cells[w[2]]) {
          status.innerText = cells[w[0]] + " Wins! 🎉"; gameActive = false; return;
        }
      }
      if(!cells.includes("")) { status.innerText = "It's a Draw! 🤝"; gameActive = false; }
    }

    function reset() { cells = ["","","","","","","","",""]; turn = "X"; gameActive = true; status.innerText = "Player X's Turn"; init(); }
    init();
  </script>
</body>
</html>
