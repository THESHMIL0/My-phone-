<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 45px 15px 10px; display: flex; align-items: center; z-index: 10;}
    .back-btn { color: #ff9f0a; font-size: 16px; cursor: pointer; font-weight: 500;}
    
    #display { flex-grow: 1; display: flex; justify-content: flex-end; align-items: flex-end; padding: 20px 30px; font-size: 80px; font-weight: 300; transition: font-size 0.2s;}
    
    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 20px 40px; }
    
    /* NEW: Fluid Animations */
    .btn { background: #333; border-radius: 50%; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-size: 36px; cursor: pointer; user-select: none; transition: transform 0.1s, filter 0.1s; }
    .btn:active { transform: scale(0.85); filter: brightness(1.5); }
    
    .operator { background: #ff9f0a; color: white; font-weight: bold;}
    .clear-btn { background: #a5a5a5; color: black; }
    
    .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 40px; justify-content: flex-start; padding-left: 35px; }
  </style>
</head>
<body>
  <div class="header"><div class="back-btn" onclick="window.parent.closeApp()">◀ Back</div></div>
  <div id="display">0</div>
  
  <div class="keypad">
    <div class="btn clear-btn" onclick="clearD()">AC</div><div class="btn clear-btn" onclick="add('(')">(</div><div class="btn clear-btn" onclick="add(')')">)</div><div class="btn operator" onclick="add('/')">÷</div>
    <div class="btn" onclick="add('7')">7</div><div class="btn" onclick="add('8')">8</div><div class="btn" onclick="add('9')">9</div><div class="btn operator" onclick="add('*')">×</div>
    <div class="btn" onclick="add('4')">4</div><div class="btn" onclick="add('5')">5</div><div class="btn" onclick="add('6')">6</div><div class="btn operator" onclick="add('-')">−</div>
    <div class="btn" onclick="add('1')">1</div><div class="btn" onclick="add('2')">2</div><div class="btn" onclick="add('3')">3</div><div class="btn operator" onclick="add('+')">+</div>
    <div class="btn zero" onclick="add('0')">0</div><div class="btn" onclick="add('.')">.</div><div class="btn operator" onclick="calc()">=</div>
  </div>

  <script>
    const d = document.getElementById('display'); 
    let math = "";

    function adjustFontSize() {
      if (d.innerText.length > 9) d.style.fontSize = '45px';
      else if (d.innerText.length > 6) d.style.fontSize = '60px';
      else d.style.fontSize = '80px';
    }

    function add(v) { 
      if(d.innerText==="0" && v!==".") d.innerText=""; 
      math += v; 
      d.innerText = math.replace(/\*/g,'×').replace(/\//g,'÷'); 
      adjustFontSize();
    }

    function clearD() { 
      math = ""; 
      d.innerText = "0"; 
      adjustFontSize();
    }

    function calc() { 
      try { 
        let r = eval(math); 
        if(r % 1 !== 0) r = parseFloat(r.toFixed(6)); // Clean up long decimals
        d.innerText = r; 
        math = r.toString(); 
        adjustFontSize();
      } catch(e) { 
        d.innerText = "Error"; 
        math = ""; 
      } 
    }
  </script>
</body>
</html>
