<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Phone OS</title>
  <style>
    /* Reset margins and stop the screen from scrolling */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000; /* Black background for boot screen */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- THE POWER ON SCREEN --- */
    #boot-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100; /* Keeps this screen on top of everything */
    }

    /* --- THE HOME SCREEN --- */
    #home-screen {
      display: none; /* Hidden until powered on */
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom right, #ff7e5f, #feb47b); 
      position: relative;
    }

    /* The camera notch at the top */
    .notch {
      width: 150px;
      height: 30px;
      background-color: #000;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* The time and battery icons */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    /* The grid holding our apps */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px;
      padding: 40px 20px;
    }

    /* Individual app styling */
    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-icon {
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }

    .app-icon:active {
      transform: scale(0.9);
    }

    .app-name {
      color: white;
      font-size: 12px;
      margin-top: 8px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div id="boot-screen" onclick="powerOn()">
    Tap to Power On ⚡
  </div>

  <div id="home-screen">
    <div class="notch"></div>
    
    <div class="status-bar">
      <span id="clock">12:00</span>
      <span>📶 🔋 100%</span>
    </div>

    <div class="app-grid">
      <div class="app-container">
        <div class="app-icon" onclick="openApp('Messages')">💬</div>
        <div class="app-name">Messages</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('Camera')">📸</div>
        <div class="app-name">Camera</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('Browser')">🌐</div>
        <div class="app-name">Browser</div>
      </div>
    </div>
  </div>

  <script>
    // --- JAVASCRIPT: The Brains of the Phone ---

    // 1. Power On and Enter Full Screen
    function powerOn() {
      // Step A: Request full screen from the browser
      let elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) { /* Safari support */
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { /* IE11 support */
        elem.msRequestFullscreen();
      }

      // Step B: Hide the boot screen and show the home screen
      document.getElementById('boot-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'block';
    }

    // 2. Make the clock work
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      
      minutes = minutes < 10 ? '0' + minutes : minutes;
      
      document.getElementById('clock').textContent = hours + ':' + minutes;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // 3. App click handler
    function openApp(appName) {
      alert("Opening " + appName + "! 🚀");
    }
  </script>

</body>
</html>
