<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Phone OS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #boot-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100; 
    }

    #home-screen {
      display: none; 
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom right, #ff7e5f, #feb47b); 
      position: relative;
    }

    .notch {
      width: 150px;
      height: 30px;
      background-color: #000;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60; 
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      position: relative;
      z-index: 60; 
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px;
      padding: 40px 20px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-icon {
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }

    .app-icon:active {
      transform: scale(0.9);
    }

    .app-name {
      color: white;
      font-size: 12px;
      margin-top: 8px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    #app-window {
      display: none; 
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: white;
      z-index: 50; 
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .home-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background-color: #333;
      border-radius: 10px;
      cursor: pointer;
      z-index: 60;
    }
  </style>
</head>
<body>

  <div id="boot-screen" onclick="powerOn()">
    Tap to Power On ⚡
  </div>

  <div class="notch"></div>
  
  <div class="status-bar" id="status-bar">
    <span id="clock">12:00</span>
    <span>📶 🔋 100%</span>
  </div>

  <div id="home-screen">
    <div class="app-grid">
      <div class="app-container">
        <div class="app-icon" onclick="openApp('messages.html')">💬</div>
        <div class="app-name">Messages</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('camera.html')">📸</div>
        <div class="app-name">Camera</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('browser.html')">🌐</div>
        <div class="app-name">Browser</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('calculator.html')">🧮</div>
        <div class="app-name">Calculator</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('notes.html')">📝</div>
        <div class="app-name">Notes</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('settings.html')">⚙️</div>
        <div class="app-name">Settings</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('tictactoe.html')">❌</div>
        <div class="app-name">Games</div>
      </div>
      <div class="app-container">
        <div class="app-icon" onclick="openApp('dialer.html')">📞</div>
        <div class="app-name">Phone</div>
      </div>
    </div>
  </div>

  <div id="app-window">
    <iframe id="app-frame" src=""></iframe>
    <div class="home-bar" onclick="closeApp()"></div>
  </div>

  <script>
    const savedWallpaper = localStorage.getItem('phoneWallpaper');
    if (savedWallpaper) {
      document.getElementById('home-screen').style.background = savedWallpaper;
    }

    function powerOn() {
      let elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      else if (elem.msRequestFullscreen) elem.msRequestFullscreen();

      document.getElementById('boot-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'block';
    }

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      minutes = minutes < 10 ? '0' + minutes : minutes;
      document.getElementById('clock').textContent = hours + ':' + minutes;
    }

    updateClock();
    setInterval(updateClock, 1000);

    function openApp(appUrl) {
      document.getElementById('app-frame').src = appUrl;
      document.getElementById('app-window').style.display = 'block';
      document.getElementById('status-bar').style.color = 'black'; 
    }

    function closeApp() {
      document.getElementById('app-window').style.display = 'none';
      document.getElementById('app-frame').src = "";
      document.getElementById('status-bar').style.color = 'white'; 
    }
  </script>

</body>
</html>
