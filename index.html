<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Phone OS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- 1. BOOT SCREEN --- */
    #boot-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100; 
    }

    /* --- 2. LOCK SCREEN (NEW!) --- */
    #lock-screen {
      display: none; /* Hidden until powered on */
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom right, #ff7e5f, #feb47b); /* Default wallpaper */
      z-index: 80; /* Sits above the home screen, but below the boot screen */
      flex-direction: column;
      align-items: center;
      color: white;
    }

    /* Dark overlay to make the lock screen text easy to read */
    .lock-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    .lock-time {
      font-size: 70px;
      font-weight: 200;
      margin-top: 80px;
      letter-spacing: 2px;
    }

    .lock-prompt {
      margin-top: 40px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* The 4 passcode dots */
    .passcode-dots {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid white;
      background-color: transparent;
      transition: background-color 0.1s;
    }

    .dot.filled {
      background-color: white;
    }

    /* Animation for wrong passcode */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
    .shake-animation {
      animation: shake 0.4s;
    }

    /* The Lock Screen Keypad */
    .lock-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 30px;
    }

    .lock-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .lock-btn:active {
      background-color: rgba(255, 255, 255, 0.4);
    }

    /* --- 3. HOME SCREEN --- */
    #home-screen {
      display: none; 
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom right, #ff7e5f, #feb47b); 
      position: relative;
    }

    .notch {
      width: 150px;
      height: 30px;
      background-color: #000;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90; /* Keeps it above everything */
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      position: relative;
      z-index: 90; 
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 20px;
      padding: 40px 20px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-icon {
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }

    .app-icon:active {
      transform: scale(0.9);
    }

    .app-name {
      color: white;
      font-size: 12px;
      margin-top: 8px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* --- 4. APP WINDOW --- */
    #app-window {
      display: none; 
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: white;
      z-index: 95; 
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .home-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background-color: #333;
      border-radius: 10px;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="boot-screen" onclick="powerOn()">
    Tap to Power On ⚡
  </div>

  <div class="notch"></div>
  <div class="status-bar" id="status-bar">
    <span id="small-clock">12:00</span>
    <span>📶 🔋 100%</span>
  </div>

  <div id="lock-screen">
    <div class="lock-overlay"></div>
    <div class="lock-time" id="big-clock">12:00</div>
    
    <div class="lock-prompt" id="lock-prompt">Enter Passcode</div>
    
    <div class="passcode-dots" id="dots-container">
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
      <div class="dot" id="dot-4"></div>
    </div>

    <div class="lock-keypad">
      <div class="lock-btn" onclick="pressLockKey('1')">1</div>
      <div class="lock-btn" onclick="pressLockKey('2')">2</div>
      <div class="lock-btn" onclick="pressLockKey('3')">3</div>
      <div class="lock-btn" onclick="pressLockKey('4')">4</div>
      <div class="lock-btn" onclick="pressLockKey('5')">5</div>
      <div class="lock-btn" onclick="pressLockKey('6')">6</div>
      <div class="lock-btn" onclick="pressLockKey('7')">7</div>
      <div class="lock-btn" onclick="pressLockKey('8')">8</div>
      <div class="lock-btn" onclick="pressLockKey('9')">9</div>
      <div></div> <div class="lock-btn" onclick="pressLockKey('0')">0</div>
      <div></div> </div>
  </div>

  <div id="home-screen">
    <div class="app-grid">
      <div class="app-container"><div class="app-icon" onclick="openApp('messages.html')">💬</div><div class="app-name">Messages</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('camera.html')">📸</div><div class="app-name">Camera</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('browser.html')">🌐</div><div class="app-name">Browser</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('calculator.html')">🧮</div><div class="app-name">Calculator</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('notes.html')">📝</div><div class="app-name">Notes</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('settings.html')">⚙️</div><div class="app-name">Settings</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('tictactoe.html')">❌</div><div class="app-name">Games</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('dialer.html')">📞</div><div class="app-name">Phone</div></div>
    </div>
  </div>

  <div id="app-window">
    <iframe id="app-frame" src=""></iframe>
    <div class="home-bar" onclick="closeApp()"></div>
  </div>

  <script>
    // --- JAVASCRIPT ---

    // Apply saved wallpaper to BOTH home screen and lock screen
    const savedWallpaper = localStorage.getItem('phoneWallpaper');
    if (savedWallpaper) {
      document.getElementById('home-screen').style.background = savedWallpaper;
      document.getElementById('lock-screen').style.background = savedWallpaper;
    }

    // --- Boot Logic ---
    function powerOn() {
      let elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      else if (elem.msRequestFullscreen) elem.msRequestFullscreen();

      document.getElementById('boot-screen').style.display = 'none';
      // Show lock screen instead of home screen!
      document.getElementById('lock-screen').style.display = 'flex'; 
    }

    // --- Clock Logic ---
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      minutes = minutes < 10 ? '0' + minutes : minutes;
      let timeString = hours + ':' + minutes;
      
      // Update both the tiny status bar clock AND the giant lock screen clock
      document.getElementById('small-clock').textContent = timeString;
      document.getElementById('big-clock').textContent = timeString;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // --- LOCK SCREEN LOGIC ---
    let enteredPasscode = "";
    const CORRECT_PASSCODE = "1234"; // <-- This is your secret password!

    function pressLockKey(num) {
      // Don't let them type more than 4 numbers
      if (enteredPasscode.length < 4) {
        enteredPasscode += num;
        updateDots();
      }

      // If they typed 4 numbers, check if it's correct
      if (enteredPasscode.length === 4) {
        // Small delay so they can see the 4th dot fill up
        setTimeout(checkPasscode, 200); 
      }
    }

    function updateDots() {
      // Clear all dots first
      for (let i = 1; i <= 4; i++) {
        document.getElementById('dot-' + i).classList.remove('filled');
      }
      // Fill in dots based on how many numbers were typed
      for (let i = 1; i <= enteredPasscode.length; i++) {
        document.getElementById('dot-' + i).classList.add('filled');
      }
    }

    function checkPasscode() {
      if (enteredPasscode === CORRECT_PASSCODE) {
        // SUCCESS! Hide lock screen, show home screen
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
        
        // Reset passcode so it's locked next time you refresh
        enteredPasscode = ""; 
        updateDots();
      } else {
        // WRONG PASSWORD! Shake the dots and clear them
        const dotsContainer = document.getElementById('dots-container');
        const prompt = document.getElementById('lock-prompt');
        
        prompt.innerText = "Wrong Passcode";
        dotsContainer.classList.add('shake-animation');
        
        // After the shake animation finishes (400ms), reset everything
        setTimeout(() => {
          dotsContainer.classList.remove('shake-animation');
          prompt.innerText = "Enter Passcode";
          enteredPasscode = "";
          updateDots();
        }, 400);
      }
    }

    // --- App Opening Logic ---
    function openApp(appUrl) {
      document.getElementById('app-frame').src = appUrl;
      document.getElementById('app-window').style.display = 'block';
      document.getElementById('status-bar').style.color = 'black'; 
    }

    function closeApp() {
      document.getElementById('app-window').style.display = 'none';
      document.getElementById('app-frame').src = "";
      document.getElementById('status-bar').style.color = 'white'; 
    }
  </script>

</body>
</html>
