<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Phone OS</title>
  <style>
    /* Centers the phone on the webpage */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #222; /* Dark background behind the phone */
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* The physical phone casing */
    .phone-case {
      width: 350px;
      height: 700px;
      background-color: #111;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      position: relative;
    }

    /* The glowing screen */
    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom right, #ff7e5f, #feb47b); /* Cool gradient wallpaper */
      border-radius: 30px;
      overflow: hidden; /* Keeps apps from spilling out of the screen */
      position: relative;
    }

    /* The camera notch at the top */
    .notch {
      width: 120px;
      height: 25px;
      background-color: #111;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* The time and battery icons */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    /* The grid holding our apps */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 apps per row */
      gap: 15px;
      padding: 30px 15px;
    }

    /* Individual app styling */
    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-icon {
      width: 55px;
      height: 55px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.1s; /* Tiny animation when clicked */
    }

    .app-icon:active {
      transform: scale(0.9); /* Shrinks slightly when pressed */
    }

    .app-name {
      color: white;
      font-size: 11px;
      margin-top: 5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div class="phone-case">
    <div class="screen">
      <div class="notch"></div>
      
      <div class="status-bar">
        <span id="clock">12:00</span>
        <span>📶 🔋 100%</span>
      </div>

      <div class="app-grid">
        <div class="app-container">
          <div class="app-icon" onclick="openApp('Messages')">💬</div>
          <div class="app-name">Messages</div>
        </div>
        <div class="app-container">
          <div class="app-icon" onclick="openApp('Camera')">📸</div>
          <div class="app-name">Camera</div>
        </div>
        <div class="app-container">
          <div class="app-icon" onclick="openApp('Browser')">🌐</div>
          <div class="app-name">Browser</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- JAVASCRIPT: The Brains of the Phone ---

    // 1. Make the clock work
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      
      // Add a zero in front of numbers less than 10 (e.g., 9:05 instead of 9:5)
      minutes = minutes < 10 ? '0' + minutes : minutes;
      
      document.getElementById('clock').textContent = hours + ':' + minutes;
    }

    // Run the clock immediately, then update it every 1 second (1000 milliseconds)
    updateClock();
    setInterval(updateClock, 1000);

    // 2. Make the apps do something when clicked
    function openApp(appName) {
      alert("You clicked the " + appName + " app! We can build this screen next. 😸");
    }
  </script>

</body>
  </html>
