<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json"><meta name="theme-color" content="#000000"><title>My Phone OS</title>
  <style>
    body{margin:0;padding:0;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;}
    #boot-screen,#loading-screen{position:absolute;top:0;left:0;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;background:#000;color:#fff;z-index:100;flex-direction:column;cursor:pointer;}
    #loading-screen{display:none;z-index:90;}
    .boot-logo{font-size:80px;margin-bottom:40px;animation:pulse 1.5s infinite alternate;}
    .loading-bar-container{width:150px;height:6px;background:#333;border-radius:6px;overflow:hidden;}
    .loading-bar-fill{width:0%;height:100%;background:#fff;animation:loadBoot 2.5s ease-out forwards;}
    @keyframes pulse{0%{opacity:0.6;transform:scale(0.95);}100%{opacity:1;transform:scale(1.05);}}
    @keyframes loadBoot{0%{width:0%;}50%{width:70%;}100%{width:100%;}}
    #lock-screen{display:none;position:absolute;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(to bottom right,#ff7e5f,#feb47b);z-index:80;flex-direction:column;align-items:center;color:#fff;transition:transform 0.5s ease;}
    .lock-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:-1;backdrop-filter:blur(2px);}
    .lock-time{font-size:75px;font-weight:200;margin-top:80px;}
    .passcode-dots{display:flex;gap:20px;margin:20px 0 30px;}
    .dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #fff;transition:0.2s;}
    .dot.filled{background:#fff;transform:scale(1.1);}
    .lock-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:15px 30px;}
    .lock-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;justify-content:center;align-items:center;font-size:32px;cursor:pointer;}
    #home-screen{display:none;width:100vw;height:100vh;background:linear-gradient(to bottom right,#ff7e5f,#feb47b);filter:blur(20px);transform:scale(1.1);transition:0.7s;}
    #home-screen.unlocked{filter:blur(0);transform:scale(1);}
    .status-bar{display:flex;justify-content:space-between;padding:12px 25px;color:#fff;font-weight:bold;z-index:90;position:relative;}
    .app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:25px 15px;padding:40px 15px;}
    .widget-2x2{grid-column:span 2;grid-row:span 2;background:rgba(0,0,0,0.3);backdrop-filter:blur(15px);border-radius:28px;padding:20px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
    .widget-time{font-size:48px;font-weight:200;margin-top:-5px;}
    .widget-date{font-size:14px;color:rgba(255,255,255,0.8);font-weight:600;}
    .app-container{display:flex;flex-direction:column;align-items:center;}
    .app-icon{width:62px;height:62px;background:rgba(255,255,255,0.95);border-radius:20px;display:flex;justify-content:center;align-items:center;font-size:34px;position:relative;overflow:hidden;}
    .app-name{color:#fff;font-size:12px;margin-top:6px;font-weight:500;}
    .hidden-app{display:none!important;}
    #app-window{position:absolute;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:95;transform:translateY(100%);transition:0.5s;border-radius:40px;overflow:hidden;}
    #app-window.open{transform:translateY(0);border-radius:0;}
    #app-frame{width:100%;height:100%;border:none;}
    .home-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:140px;height:6px;background:#111;border-radius:10px;z-index:100;}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.7);animation:ripple-anim 0.6s linear;pointer-events:none;}
    @keyframes ripple-anim{to{transform:scale(4);opacity:0;}}
    #app-switcher{display:none;position:absolute;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.8);z-index:97;flex-direction:row;align-items:center;overflow-x:auto;padding:30px;gap:25px;}
    .switcher-card{min-width:220px;height:450px;background:#fff;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
    .close-app-btn{position:absolute;top:-15px;right:-15px;background:#ff3b30;color:#fff;border-radius:50%;width:35px;height:35px;display:flex;align-items:center;justify-content:center;}
  </style>
</head>
<body>
  <div id="boot-screen" onclick="powerOn()">Tap to Power On ⚡</div>
  <div id="loading-screen"><div class="boot-logo">📱</div><div class="loading-bar-container"><div class="loading-bar-fill"></div></div></div>
  <div class="status-bar"><div id="small-clock">12:00</div><div>📶 🔋 100%</div></div>
  
  <div id="app-switcher"></div>
  
  <div id="lock-screen">
    <div class="lock-overlay"></div><div class="lock-time" id="big-clock">12:00</div>
    <div class="passcode-dots" id="dots-container"><div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div></div>
    <div class="lock-keypad">
      <div class="lock-btn" onclick="pressLockKey('1')">1</div><div class="lock-btn" onclick="pressLockKey('2')">2</div><div class="lock-btn" onclick="pressLockKey('3')">3</div>
      <div class="lock-btn" onclick="pressLockKey('4')">4</div><div class="lock-btn" onclick="pressLockKey('5')">5</div><div class="lock-btn" onclick="pressLockKey('6')">6</div>
      <div class="lock-btn" onclick="pressLockKey('7')">7</div><div class="lock-btn" onclick="pressLockKey('8')">8</div><div class="lock-btn" onclick="pressLockKey('9')">9</div>
      <div></div><div class="lock-btn" onclick="pressLockKey('0')">0</div><div></div>
    </div>
  </div>

  <div id="home-screen">
    <div class="app-grid" id="app-grid">
      <div class="widget-2x2" onclick="openApp('weather.html', 'Weather', '🌤️')">
        <div><div class="widget-date" id="widget-date">MON, JAN 1</div><div class="widget-time" id="widget-time">12:00</div></div>
        <div style="font-size:16px;">🌤️ 72° • Local</div>
      </div>
      <div class="app-container" onclick="openApp('messages.html','Messages','💬')"><div class="app-icon">💬</div><div class="app-name">Messages</div></div>
      <div class="app-container" onclick="openApp('browser.html','Browser','🌐')"><div class="app-icon">🌐</div><div class="app-name">Browser</div></div>
      <div class="app-container" onclick="openApp('gallery.html','Gallery','🖼️')"><div class="app-icon">🖼️</div><div class="app-name">Gallery</div></div>
      <div class="app-container" onclick="openApp('clock.html','Clock','⏱️')"><div class="app-icon">⏱️</div><div class="app-name">Clock</div></div>
      <div class="app-container" onclick="openApp('music.html','Music','🎵')"><div class="app-icon">🎵</div><div class="app-name">Music</div></div>
      <div class="app-container" onclick="openApp('appstore.html','Store','🛒')"><div class="app-icon">🛒</div><div class="app-name">Store</div></div>
      <div class="app-container hidden-app" id="app-paint" onclick="openApp('paint.html','Paint','🎨')"><div class="app-icon">🎨</div><div class="app-name">Paint</div></div>
      <div class="app-container hidden-app" id="app-snake" onclick="openApp('snake.html','Snake','🐍')"><div class="app-icon">🐍</div><div class="app-name">Snake</div></div>
      <div class="app-container hidden-app" id="app-piano" onclick="openApp('piano.html','Piano','🎹')"><div class="app-icon">🎹</div><div class="app-name">Piano</div></div>
      <div class="app-container hidden-app" id="app-videotube" onclick="openApp('videotube.html','VideoTube','🎬')"><div class="app-icon">🎬</div><div class="app-name">VideoTube</div></div>
      <div class="app-container" onclick="openApp('settings.html','Settings','⚙️')"><div class="app-icon">⚙️</div><div class="app-name">Settings</div></div>
    </div>
  </div>

  <div id="app-window">
    <iframe id="app-frame" src=""></iframe>
    <div class="home-bar" onclick="closeApp()" ondblclick="openAppSwitcher()"></div>
  </div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    const savedWall = localStorage.getItem('phoneWallpaper');
    if (savedWall) { document.getElementById('home-screen').style.background = savedWall; document.getElementById('lock-screen').style.background = savedWall; }
    
    ['paint','snake','piano','videotube'].forEach(a => { if(localStorage.getItem('own_'+a) === 'true') document.getElementById('app-'+a).classList.remove('hidden-app'); });

    let recentApps = [];
    function openAppSwitcher() {
      if(recentApps.length === 0) return;
      const sw = document.getElementById('app-switcher'); sw.innerHTML = '';
      recentApps.forEach((app, i) => {
        sw.innerHTML += `<div class="switcher-card" onclick="openApp('${app.url}','${app.name}','${app.icon}')"><div class="close-app-btn" onclick="closeFromSwitcher(${i}, event)">✕</div><div style="font-size:80px;">${app.icon}</div><h2>${app.name}</h2></div>`;
      });
      sw.style.display = 'flex'; document.getElementById('app-window').classList.remove('open');
    }
    
    function closeFromSwitcher(i, e) { 
      e.stopPropagation(); recentApps.splice(i, 1); openAppSwitcher(); 
      if(!recentApps.length) document.getElementById('app-switcher').style.display='none'; 
    }

    // THE FIX: Simplified powerOn so it never gets stuck!
    function powerOn() {
      document.getElementById('boot-screen').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'flex';
      
      // Forces the screen to hide after exactly 2.6 seconds
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('lock-screen').style.display = 'flex';
      }, 2600);
    }
    
    function updateClock() {
      const d = new Date(); let h = d.getHours(), m = d.getMinutes(); m = m<10?'0'+m:m;
      document.getElementById('small-clock').textContent = h+':'+m;
      document.getElementById('big-clock').textContent = h+':'+m;
      document.getElementById('widget-time').textContent = h+':'+m;
    }
    updateClock(); setInterval(updateClock, 1000);

    var PASS = localStorage.getItem('phonePasscode') || "1234"; let entered = "";
    function pressLockKey(n) {
      if (entered.length < 4) { entered += n; updateDots(); }
      if (entered.length === 4) setTimeout(checkPass, 200);
    }
    function updateDots() {
      for (let i=1; i<=4; i++) document.getElementById('dot-'+i).classList.remove('filled');
      for (let i=1; i<=entered.length; i++) document.getElementById('dot-'+i).classList.add('filled');
    }
    function checkPass() {
      if (entered === PASS) {
        document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
        setTimeout(() => document.getElementById('home-screen').classList.add('unlocked'), 100);
        setTimeout(() => { document.getElementById('lock-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'block'; }, 600);
      } else { entered = ""; updateDots(); alert("Wrong Passcode! Try 1234"); }
    }

    document.querySelectorAll('.app-icon').forEach(i => {
      i.addEventListener('pointerdown', function(e) {
        let r = document.createElement('span'); r.className = 'ripple';
        let rect = this.getBoundingClientRect(); let size = Math.max(rect.width, rect.height);
        r.style.width = r.style.height = size+'px'; r.style.left = e.clientX-rect.left-size/2+'px'; r.style.top = e.clientY-rect.top-size/2+'px';
        this.appendChild(r); setTimeout(() => r.remove(), 600);
      });
    });

    function openApp(url, name, icon) {
      if(name && !recentApps.some(a => a.name === name)) recentApps.push({url, name, icon});
      document.getElementById('app-switcher').style.display = 'none';
      setTimeout(() => {
        document.getElementById('app-frame').src = url;
        document.getElementById('app-window').classList.add('open');
      }, 150);
    }
    
    function closeApp() {
      document.getElementById('app-window').classList.remove('open');
      setTimeout(() => document.getElementById('app-frame').src = "", 500);
    }
    
    function installApp(id) { document.getElementById(id).classList.remove('hidden-app'); }
  </script>
</body>
</html>
