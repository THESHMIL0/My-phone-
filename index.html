<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/GitHub_Invertocat_Logo.svg/512px-GitHub_Invertocat_Logo.svg.png">
  
  <title>My Phone OS</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, sans-serif; }

    #boot-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: white; font-size: 24px; cursor: pointer; z-index: 100; transition: opacity 0.5s; }
    
    #lock-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(to bottom right, #ff7e5f, #feb47b); z-index: 80; flex-direction: column; align-items: center; color: white; transition: transform 0.4s ease-in-out; }
    .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }
    .lock-time { font-size: 70px; font-weight: 200; margin-top: 80px; letter-spacing: 2px; }
    .lock-prompt { margin-top: auto; font-size: 16px; margin-bottom: 20px; }
    .passcode-dots { display: flex; gap: 20px; margin-bottom: 30px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; background: transparent; }
    .dot.filled { background: white; }
    .lock-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 30px; margin-bottom: 20px;}
    .lock-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); display: flex; justify-content: center; align-items: center; font-size: 30px; color: white; cursor: pointer; }

    #home-screen { display: none; width: 100vw; height: 100vh; background: linear-gradient(to bottom right, #ff7e5f, #feb47b); position: relative; }
    
    .notch { 
      width: 150px; height: 30px; background: #000; border-radius: 0 0 15px 15px; 
      position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 101; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; justify-content: center; align-items: center; color: #ff9f0a; font-weight: bold; font-family: monospace; font-size: 14px; overflow: hidden;
    }
    .notch.expanded { width: 200px; height: 40px; border-radius: 20px; top: 10px; }
    .notch-text { opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
    .notch.expanded .notch-text { opacity: 1; }

    .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; color: white; font-size: 14px; font-weight: bold; position: relative; z-index: 90; pointer-events: none;}
    
    .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 15px; padding: 40px 15px; }
    .app-container { display: flex; flex-direction: column; align-items: center; cursor: grab; }
    .app-icon { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.95); border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); pointer-events: none; }
    .app-name { color: white; font-size: 12px; margin-top: 5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); pointer-events: none;}

    .hidden-app { display: none !important; }

    #app-window { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 95; transform: translateY(100%); opacity: 0; pointer-events: none; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s; }
    #app-window.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    #app-frame { width: 100%; height: 100%; border: none; }
    .home-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: #333; border-radius: 10px; cursor: pointer; z-index: 100; }
  </style>
</head>
<body>

  <div id="boot-screen" onclick="powerOn()">Tap to Power On ⚡</div>

  <div class="notch" id="dynamic-island"><span class="notch-text" id="notch-text"></span></div>
  
  <div class="status-bar" id="status-bar">
    <span id="small-clock">12:00</span>
    <span>📶 <span id="battery-display">🔋 100%</span></span>
  </div>

  <div id="lock-screen">
    <div class="lock-overlay"></div>
    <div class="lock-time" id="big-clock">12:00</div>
    <div class="lock-prompt" id="lock-prompt">Enter Passcode</div>
    <div class="passcode-dots" id="dots-container">
      <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div>
    </div>
    <div class="lock-keypad">
      <div class="lock-btn" onclick="pressLockKey('1')">1</div><div class="lock-btn" onclick="pressLockKey('2')">2</div><div class="lock-btn" onclick="pressLockKey('3')">3</div>
      <div class="lock-btn" onclick="pressLockKey('4')">4</div><div class="lock-btn" onclick="pressLockKey('5')">5</div><div class="lock-btn" onclick="pressLockKey('6')">6</div>
      <div class="lock-btn" onclick="pressLockKey('7')">7</div><div class="lock-btn" onclick="pressLockKey('8')">8</div><div class="lock-btn" onclick="pressLockKey('9')">9</div>
      <div></div><div class="lock-btn" onclick="pressLockKey('0')">0</div><div></div>
    </div>
  </div>

  <div id="home-screen">
    <div class="app-grid" id="app-grid">
      <div class="app-container" onclick="openApp('messages.html')"><div class="app-icon">💬</div><div class="app-name">Messages</div></div>
      <div class="app-container" onclick="openApp('browser.html')"><div class="app-icon">🌐</div><div class="app-name">Browser</div></div>
      <div class="app-container" onclick="openApp('camera.html')"><div class="app-icon">📸</div><div class="app-name">Camera</div></div>
      <div class="app-container" onclick="openApp('settings.html')"><div class="app-icon">⚙️</div><div class="app-name">Settings</div></div>
      <div class="app-container" onclick="openApp('clock.html')"><div class="app-icon" style="background: #000; color: #ff9f0a;">⏱️</div><div class="app-name">Clock</div></div>
      <div class="app-container" onclick="openApp('appstore.html')"><div class="app-icon" style="background: #007aff; color: white;">🛒</div><div class="app-name">App Store</div></div>
      
      <div class="app-container hidden-app" id="app-assistant" onclick="openApp('assistant.html')"><div class="app-icon" style="background: linear-gradient(to right, #ff00cc, #333399); color: white;">🎙️</div><div class="app-name">Assistant</div></div>
      <div class="app-container hidden-app" id="app-paint" onclick="alert('Paint not built yet!')"><div class="app-icon" style="background: #ffcc00;">🎨</div><div class="app-name">Paint</div></div>
    </div>
  </div>

  <div id="app-window">
    <iframe id="app-frame" src=""></iframe>
    <div class="home-bar" onclick="closeApp()"></div>
  </div>

  <script>
    // --- PWA SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered!'))
        .catch(err => console.log('Service Worker Error: ', err));
    }

    const savedWallpaper = localStorage.getItem('phoneWallpaper');
    if (savedWallpaper) { document.getElementById('home-screen').style.background = savedWallpaper; document.getElementById('lock-screen').style.background = savedWallpaper; }

    if (localStorage.getItem('own_assistant') === 'true') document.getElementById('app-assistant').classList.remove('hidden-app');
    if (localStorage.getItem('own_paint') === 'true') document.getElementById('app-paint').classList.remove('hidden-app');

    function updateNotch(text, isActive) {
      const island = document.getElementById('dynamic-island');
      const notchText = document.getElementById('notch-text');
      if (isActive) {
        island.classList.add('expanded');
        notchText.innerText = "⏱️ " + text;
      } else {
        island.classList.remove('expanded');
        notchText.innerText = "";
      }
    }

    function powerOn() {
      let elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      document.getElementById('boot-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('lock-screen').style.display = 'flex'; 
      }, 500);
    }
    
    function updateClock() {
      const now = new Date();
      let hours = now.getHours(), minutes = now.getMinutes();
      minutes = minutes < 10 ? '0' + minutes : minutes;
      document.getElementById('small-clock').textContent = hours + ':' + minutes;
      document.getElementById('big-clock').textContent = hours + ':' + minutes;
    }
    updateClock(); setInterval(updateClock, 1000);

    var CORRECT_PASSCODE = localStorage.getItem('phonePasscode') || "1234";
    let enteredPasscode = "";
    function pressLockKey(num) {
      if (enteredPasscode.length < 4) { enteredPasscode += num; updateDots(); }
      if (enteredPasscode.length === 4) setTimeout(checkPasscode, 200);
    }
    function updateDots() {
      for (let i = 1; i <= 4; i++) document.getElementById('dot-' + i).classList.remove('filled');
      for (let i = 1; i <= enteredPasscode.length; i++) document.getElementById('dot-' + i).classList.add('filled');
    }
    function checkPasscode() {
      if (enteredPasscode === CORRECT_PASSCODE) {
        document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
        setTimeout(() => {
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('lock-screen').style.transform = 'translateY(0)';
          document.getElementById('home-screen').style.display = 'block';
        }, 400);
        enteredPasscode = ""; updateDots();
      } else {
        enteredPasscode = ""; updateDots();
      }
    }

    function openApp(appUrl) {
      document.getElementById('app-frame').src = appUrl;
      document.getElementById('app-window').classList.add('open');
      if(localStorage.getItem('phoneDarkMode') === 'true') { document.getElementById('status-bar').style.color = 'white'; } else { document.getElementById('status-bar').style.color = 'black'; }
    }
    function closeApp() {
      document.getElementById('app-window').classList.remove('open');
      setTimeout(() => { document.getElementById('app-frame').src = ""; }, 400); 
      document.getElementById('status-bar').style.color = 'white'; 
    }

    function installApp(appId) {
      document.getElementById(appId).classList.remove('hidden-app');
    }
  </script>
</body>
</html>
