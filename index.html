<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Phone OS</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* Boot & Lock Screens */
    #boot-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: white; font-size: 24px; cursor: pointer; z-index: 100; transition: opacity 0.5s; }
    #lock-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(to bottom right, #ff7e5f, #feb47b); z-index: 80; flex-direction: column; align-items: center; color: white; transition: transform 0.4s ease-in-out; }
    .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }
    .lock-time { font-size: 70px; font-weight: 200; margin-top: 80px; letter-spacing: 2px; }
    .lock-prompt { margin-top: 40px; font-size: 16px; margin-bottom: 20px; }
    .passcode-dots { display: flex; gap: 20px; margin-bottom: 50px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; background: transparent; transition: background 0.2s; }
    .dot.filled { background: white; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    .shake-animation { animation: shake 0.4s; }
    .lock-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 30px; }
    .lock-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); display: flex; justify-content: center; align-items: center; font-size: 32px; color: white; cursor: pointer; user-select: none; transition: background 0.2s; }
    .lock-btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }

    /* Home Screen */
    #home-screen { display: none; width: 100vw; height: 100vh; background: linear-gradient(to bottom right, #ff7e5f, #feb47b); position: relative; }
    .notch { width: 150px; height: 30px; background: #000; border-radius: 0 0 15px 15px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 90; }
    .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; color: white; font-size: 14px; font-weight: bold; position: relative; z-index: 90; transition: color 0.3s; }
    .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px 20px; }
    .app-container { display: flex; flex-direction: column; align-items: center; }
    
    /* App Icon Animations */
    .app-icon { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.95); border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .app-icon:active { transform: scale(0.85); filter: brightness(0.9); }
    .app-name { color: white; font-size: 12px; margin-top: 8px; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); }

    /* --- NEW APP SLIDE ANIMATION --- */
    #app-window { 
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 95; 
      /* Hide it down below the screen initially */
      transform: translateY(100%); 
      opacity: 0;
      pointer-events: none; /* Can't click it when hidden */
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
    }
    
    /* When we add the 'open' class, it slides up! */
    #app-window.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    #app-frame { width: 100%; height: 100%; border: none; }
    .home-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: #333; border-radius: 10px; cursor: pointer; z-index: 100; transition: background 0.3s; }
    .home-bar:active { background: #888; }
  </style>
</head>
<body>

  <div id="boot-screen" onclick="powerOn()">Tap to Power On ⚡</div>

  <div class="notch"></div>
  <div class="status-bar" id="status-bar">
    <span id="small-clock">12:00</span><span>📶 🔋 100%</span>
  </div>

  <div id="lock-screen">
    <div class="lock-overlay"></div>
    <div class="lock-time" id="big-clock">12:00</div>
    <div class="lock-prompt" id="lock-prompt">Enter Passcode</div>
    <div class="passcode-dots" id="dots-container">
      <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div>
    </div>
    <div class="lock-keypad">
      <div class="lock-btn" onclick="pressLockKey('1')">1</div><div class="lock-btn" onclick="pressLockKey('2')">2</div><div class="lock-btn" onclick="pressLockKey('3')">3</div>
      <div class="lock-btn" onclick="pressLockKey('4')">4</div><div class="lock-btn" onclick="pressLockKey('5')">5</div><div class="lock-btn" onclick="pressLockKey('6')">6</div>
      <div class="lock-btn" onclick="pressLockKey('7')">7</div><div class="lock-btn" onclick="pressLockKey('8')">8</div><div class="lock-btn" onclick="pressLockKey('9')">9</div>
      <div></div><div class="lock-btn" onclick="pressLockKey('0')">0</div><div></div>
    </div>
  </div>

  <div id="home-screen">
    <div class="app-grid">
      <div class="app-container"><div class="app-icon" onclick="openApp('messages.html')">💬</div><div class="app-name">Messages</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('browser.html')">🌐</div><div class="app-name">Browser</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('weather.html')" style="background: #4facfe; color: white;">🌤️</div><div class="app-name">Weather</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('music.html')" style="background: #ff0844; color: white;">🎵</div><div class="app-name">Music</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('calculator.html')">🧮</div><div class="app-name">Calculator</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('notes.html')">📝</div><div class="app-name">Notes</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('settings.html')">⚙️</div><div class="app-name">Settings</div></div>
      <div class="app-container"><div class="app-icon" onclick="openApp('dialer.html')" style="background: #34c759; color: white;">📞</div><div class="app-name">Phone</div></div>
    </div>
  </div>

  <div id="app-window">
    <iframe id="app-frame" src=""></iframe>
    <div class="home-bar" onclick="closeApp()"></div>
  </div>

  <script>
    const savedWallpaper = localStorage.getItem('phoneWallpaper');
    if (savedWallpaper) {
      document.getElementById('home-screen').style.background = savedWallpaper;
      document.getElementById('lock-screen').style.background = savedWallpaper;
    }

    function powerOn() {
      let elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      else if (elem.msRequestFullscreen) elem.msRequestFullscreen();

      document.getElementById('boot-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('lock-screen').style.display = 'flex'; 
      }, 500);
    }

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      minutes = minutes < 10 ? '0' + minutes : minutes;
      let timeString = hours + ':' + minutes;
      document.getElementById('small-clock').textContent = timeString;
      document.getElementById('big-clock').textContent = timeString;
    }
    updateClock(); setInterval(updateClock, 1000);

    var CORRECT_PASSCODE = localStorage.getItem('phonePasscode') || "1234";
    let enteredPasscode = "";

    function pressLockKey(num) {
      if (enteredPasscode.length < 4) { enteredPasscode += num; updateDots(); }
      if (enteredPasscode.length === 4) { setTimeout(checkPasscode, 200); }
    }

    function updateDots() {
      for (let i = 1; i <= 4; i++) document.getElementById('dot-' + i).classList.remove('filled');
      for (let i = 1; i <= enteredPasscode.length; i++) document.getElementById('dot-' + i).classList.add('filled');
    }

    function checkPasscode() {
      if (enteredPasscode === CORRECT_PASSCODE) {
        // Unlock animation: Slide up
        document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
        setTimeout(() => {
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('lock-screen').style.transform = 'translateY(0)';
          document.getElementById('home-screen').style.display = 'block';
        }, 400);
        enteredPasscode = ""; updateDots();
      } else {
        const dots = document.getElementById('dots-container'), prompt = document.getElementById('lock-prompt');
        prompt.innerText = "Wrong Passcode"; dots.classList.add('shake-animation');
        setTimeout(() => { dots.classList.remove('shake-animation'); prompt.innerText = "Enter Passcode"; enteredPasscode = ""; updateDots(); }, 400);
      }
    }

    function openApp(appUrl) {
      document.getElementById('app-frame').src = appUrl;
      // Add the open class to trigger the smooth slide-up animation
      document.getElementById('app-window').classList.add('open');
      document.getElementById('status-bar').style.color = 'black'; 
    }

    function closeApp() {
      // Remove the open class to slide it back down
      document.getElementById('app-window').classList.remove('open');
      setTimeout(() => { document.getElementById('app-frame').src = ""; }, 400); // Wait for animation to finish before clearing
      document.getElementById('status-bar').style.color = 'white'; 
    }
  </script>

</body>
</html>
