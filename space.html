<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Shooter</title>
  <style>
    body { margin:0; background:#000; overflow:hidden; touch-action:none; color:white; font-family:-apple-system, sans-serif;}
    .header { padding:45px 15px 10px; display:flex; justify-content:space-between; position:absolute; width:100%; box-sizing:border-box; z-index:10; font-size:18px;}
    .btn { color:#34c759; font-weight:bold; cursor:pointer;}
    canvas { display:block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="btn" onclick="window.parent.closeApp()">◀ Quit</span>
    <span id="score" style="font-weight:bold; color: #ffcc00;">Score: 0</span>
  </div>
  <canvas id="game"></canvas>
  <script>
    const cvs = document.getElementById('game'), ctx = cvs.getContext('2d'), scoreEl = document.getElementById('score');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    
    let score = 0, frames = 0, playing = true;
    let player = { x: cvs.width/2 - 20, y: cvs.height - 80, w: 40, h: 40 };
    let bullets = [], enemies = [];

    cvs.addEventListener('touchmove', e => { player.x = e.touches[0].clientX - player.w/2; });

    function draw() {
      if(!playing) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.3)"; ctx.fillRect(0,0,cvs.width,cvs.height); // Star trail effect
      
      // Draw Player (Ship Emoji)
      ctx.font = "40px Arial"; ctx.fillText("🚀", player.x, player.y + 35);
      
      // Shoot bullets
      if(frames % 15 === 0) bullets.push({ x: player.x + 18, y: player.y, w: 4, h: 15 });
      ctx.fillStyle = '#34c759';
      for(let i=0; i<bullets.length; i++) {
        let b = bullets[i]; b.y -= 10; ctx.fillRect(b.x, b.y, b.w, b.h);
        if(b.y < 0) bullets.splice(i, 1);
      }

      // Spawn and draw enemies (Alien Emoji)
      if(frames % 40 === 0) enemies.push({ x: Math.random()*(cvs.width-40), y: -40, w: 40, h: 40 });
      for(let i=0; i<enemies.length; i++) {
        let e = enemies[i]; e.y += 3 + (score/50); 
        ctx.fillText("👾", e.x, e.y + 35);
        
        if(e.y > cvs.height) { alert("Game Over! Score: " + score); playing = false; document.location.reload(); return; }
        
        // Collision Detection
        for(let j=0; j<bullets.length; j++) {
          let b = bullets[j];
          if(b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
            score += 10; scoreEl.innerText = "Score: " + score;
            enemies.splice(i, 1); bullets.splice(j, 1); break;
          }
        }
      }
      frames++; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
