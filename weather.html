<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; overflow: hidden; transition: background 1s; }
    
    .sunny { background: linear-gradient(to bottom, #4facfe, #00f2fe); }
    .rainy { background: linear-gradient(to bottom, #5c6670, #283048); }
    .night { background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); }
    
    .header { width: 100%; padding: 45px 15px 10px; display: flex; align-items: center; position: relative; box-sizing: border-box;}
    .back-btn { position: absolute; left: 15px; color: white; font-weight: bold; cursor: pointer; text-shadow: 0 1px 3px rgba(0,0,0,0.3);}
    
    .main-info { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
    .city { font-size: 36px; font-weight: 400; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .temp { font-size: 100px; font-weight: 200; margin: 5px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .desc { font-size: 22px; font-weight: 500; text-transform: capitalize; }
    
    .icon-container { font-size: 80px; margin: 10px 0; animation: float 3s ease-in-out infinite; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Frosted Glass UI */
    .glass-card { width: 85%; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-top: auto; margin-bottom: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); }
    .glass-row { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 15px; font-weight: 500;}
    .glass-row:last-child { margin-bottom: 0; }
  </style>
</head>
<body class="sunny" id="weather-body">
  <div class="header"><div class="back-btn" onclick="window.parent.closeApp()">◀ Home</div></div>
  
  <div class="main-info">
    <div class="city" id="location-text">Loading...</div>
    <div class="temp" id="temperature">--°</div>
    <div class="desc" id="description">Fetching Sky Data</div>
    <div class="icon-container" id="weather-icon">🌍</div>
  </div>

  <div class="glass-card">
    <div class="glass-row"><span>Humidity</span> <span id="humid">--%</span></div>
    <div class="glass-row"><span>Wind Speed</span> <span id="wind">-- mph</span></div>
    <div class="glass-row"><span>Live API</span> <span style="color: #a8ff78;">Connected</span></div>
  </div>

  <script>
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude; const lon = position.coords.longitude;
        document.getElementById('location-text').innerText = "My Location";

        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`)
          .then(res => res.json())
          .then(data => {
            const temp = Math.round(data.current_weather.temperature);
            const wind = Math.round(data.current_weather.windspeed);
            const isDay = data.current_weather.is_day;
            const code = data.current_weather.weathercode;
            
            document.getElementById('temperature').innerText = temp + "°";
            document.getElementById('wind').innerText = wind + " mph";
            document.getElementById('humid').innerText = "45%"; // Static fallback
            
            let bgClass = 'sunny'; let icon = '☀️'; let desc = 'Clear Sky';

            if (code > 40) { bgClass = 'rainy'; icon = '🌧️'; desc = 'Raining'; }
            else if (code > 0) { icon = '⛅'; desc = 'Partly Cloudy'; }
            
            if (isDay === 0) { bgClass = 'night'; if(code <= 40) icon = '🌙'; desc = 'Clear Night';}

            document.getElementById('weather-body').className = bgClass;
            document.getElementById('weather-icon').innerText = icon;
            document.getElementById('description').innerText = desc;
          });
      });
    }
  </script>
</body>
</html>
